<!DOCTYPE html>
<html>
<head>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap');
    body {
      font-family: 'Inter', sans-serif;
      width: 250px;
      padding: 16px;
      margin: 0;
      background: #f8fafc;
      color: #0f172a;
      text-align: center;
    }
    .status {
      display: inline-block;
      width: 12px;
      height: 12px;
      background-color: #10b981;
      border-radius: 50%;
      margin-right: 8px;
      box-shadow: 0 0 8px #10b981;
    }
    h2 {
      margin: 0 0 8px 0;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    p {
      margin: 0;
      font-size: 13px;
      color: #64748b;
    }
  </style>
</head>
<body>
  <h2><span class="status"></span> Stealth-Ex is Live</h2>
  <p>Scanning the active tab for questions...</p>
  <button id="reloadBtn" style="margin-top: 12px; padding: 6px 12px; background: #3b82f6; color: white; border: none; border-radius: 4px; cursor: pointer; width: 100%; font-weight: 600;">Reload Extension (Apply Updates)</button>
  <script>
    document.getElementById('reloadBtn').onclick = () => {
      chrome.runtime.reload();
    };
  </script>
</body>
</html>
